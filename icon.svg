<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Control de Pasajes">
  <defs>
    <!-- Degradado morado de fondo -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Recorte del ticket: muescas circulares a izquierda y derecha -->
    <mask id="ticketMask">
      <rect x="0" y="0" width="512" height="512" fill="#fff"/>
      <!-- Las muescas (negro) recortan los lados del ticket -->
      <circle cx="148" cy="256" r="26" fill="#000"/>
      <circle cx="364" cy="256" r="26" fill="#000"/>
    </mask>
  </defs>

  <!-- Fondo redondeado (maskable: el motivo central queda dentro del 80% seguro) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Cuerpo del ticket (blanco) con muescas laterales recortadas -->
  <g mask="url(#ticketMask)">
    <rect x="148" y="150" width="216" height="212" rx="22" ry="22"
          fill="#ffffff"/>
  </g>

  <!-- Línea perforada vertical que une las dos muescas -->
  <line x1="256" y1="158" x2="256" y2="354"
        stroke="#ddd6fe" stroke-width="8" stroke-linecap="round"
        stroke-dasharray="2 22"/>

  <!-- Símbolo de soles "S/" en el talón izquierdo del ticket -->
  <text x="202" y="276" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="78" fill="#7c3aed">S/</text>

  <!-- Líneas de detalle (texto del boleto) en el talón derecho -->
  <g fill="#c4b5fd">
    <rect x="288" y="216" width="58" height="14" rx="7"/>
    <rect x="288" y="249" width="46" height="14" rx="7"/>
    <rect x="288" y="282" width="58" height="14" rx="7"/>
  </g>
</svg>
